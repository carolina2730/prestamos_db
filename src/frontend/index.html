<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>prestamo</title>
</head>
<body>
    <h2>Registrar prestamo</h2>
    <form id="formPrestamo">
        <input type="text" id="nombre" placeholder="Nombre" required><br><br>
        <input type="number" id="monto" placeholder="Monto" required><br><br>
        <input type="number" id="plazo" placeholder="PlazoMeses" required><br><br>
        <input type="number" step="0.01" id="tasa" placeholder="TasaInterés: 0.01" required><br><br>
        <input type="text" id="estado" placeholder="Estado: activo/inactivo" required><br><br>
        <button type="submit">Guardar</button>
    </form>

    <h2>Lista de Préstamos</h2>
    <table border="1" id="tabla">
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>Monto</th><th>PlazoMeses</th><th>TasaInteres</th><th>Estado</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

<script>
const URL = "http://localhost:8081/prestamos";

document.getElementById("formPrestamo").addEventListener("submit", async (e) => {
    e.preventDefault(); // 1. Evita que recargue
    console.log("1. Click detectado");

    const prestamo = {
        nombre: document.getElementById("nombre").value,
        monto: parseFloat(document.getElementById("monto").value),
        plazoMeses: parseInt(document.getElementById("plazo").value),
        tasaInteres: parseFloat(document.getElementById("tasa").value),
        estado: document.getElementById("estado").value
    };
    console.log("2. Datos:", prestamo);

    try {
        const res = await fetch(URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(prestamo)
        });
        console.log("3. Respuesta del server:", res.status);

        const data = await res.json();
        alert(data);
        cargarPrestamos();
    } catch(error) {
        console.error("4. ERROR EN FETCH:", error); // <--- Si hay CORS te sale aquí
        alert("Error: " + error);
    }
});

async function cargarPrestamos() {
    const res = await fetch(URL);
    const lista = await res.json();

    let filas = "";
    for(let p of lista){
        filas += `
            <tr>
                <td>${p.id}</td>
                <td>${p.nombre}</td>
                <td>${p.monto}</td>
                <td>${p.plazoMeses}</td>
                <td>${p.tasaInteres}</td>
                <td>${p.estado}</td>
            </tr>
        `;
    }
    
    document.getElementById("tablaBody").innerHTML = `
        <tr><th>ID</th><th>Nombre</th><th>Monto</th><th>Plazo</th><th>Tasa</th><th>Estado</th></tr>
        ${filas}
    `;
}
cargarPrestamos();
</script>
